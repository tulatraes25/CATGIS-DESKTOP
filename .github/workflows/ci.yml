name: CATGIS CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  desktop-build:
    name: Java Desktop Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: catgis-desktop
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest

      - name: Build & Test
        run: ./gradlew build jacocoTestReport

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: catgis-desktop/build/reports/jacoco/

  web-lint:
    name: Web Viewer Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: catserver-web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: catserver-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
