    }
}

String findExecutableOnPath(String executableName) {
    String path = System.getenv('PATH') ?: ''
    for (String entry : path.split(java.io.File.pathSeparator)) {
        if (!entry) {
            continue
        }
        File candidate = new File(entry, executableName)
        if (candidate.exists()) {
            return candidate.absolutePath
        }
    }
    return null
}

boolean signWindowsBinary(Project project, File targetFile) {
    Map signingConfig = project.ext.resolveSigningConfig.call()
    if (signingConfig == null) {
        project.logger.lifecycle("Firma digital no configurada para ${targetFile.absolutePath}.")
        return false
    }

    File signTool = project.ext.resolveSignTool.call()
    if (signTool == null || !signTool.exists()) {
        throw new GradleException('No se encontro signtool.exe. Instala Windows SDK o define CATGIS_SIGNTOOL_EXE para firmar digitalmente los artefactos Windows.')
    }
    if (!targetFile.exists()) {
        throw new GradleException("No se encontro el archivo a firmar en ${targetFile.absolutePath}.")
    }
    if (signingConfig.pfxFile != null && !signingConfig.pfxFile.exists()) {
        throw new GradleException("No se encontro el certificado PFX en ${signingConfig.pfxFile.absolutePath}.")
    }

    List<String> command = [
            signTool.absolutePath,
            'sign',
            '/fd', 'SHA256'
    ]

    if (signingConfig.timestampUrl) {
        command.addAll(['/tr', signingConfig.timestampUrl, '/td', 'SHA256'])
    }

    if (signingConfig.pfxFile != null) {
        command.addAll(['/f', signingConfig.pfxFile.absolutePath])
        if (signingConfig.pfxPassword) {
            command.addAll(['/p', signingConfig.pfxPassword])
        }
    } else if (signingConfig.thumbprint) {
        command.addAll(['/sha1', signingConfig.thumbprint])
    } else {
        throw new GradleException('La configuracion de firma es invalida: falta PFX o thumbprint.')
    }

    command.add(targetFile.absolutePath)

    project.logger.lifecycle("Firmando ${targetFile.name} con ${signTool.absolutePath}")
    runExternalCommand(command, [:], "Fallo al firmar binario ${targetFile.name}.")
    return true
}

BufferedImage createBrandIconImage(int size) {
    BufferedImage installerSource = loadInstallerIconSourceImage()
    if (installerSource != null) {
        return createDirectSourceIconImage(installerSource, size)
    }

    BufferedImage splashSource = loadSplashSourceImage()
    if (splashSource != null) {
        return createSplashBasedIconImage(splashSource, size)
    }

    return createFallbackBrandIconImage(size)
}

BufferedImage loadInstallerIconSourceImage() {
    return readOptionalImage(file('packaging/windows/catgis-installer-source.png'))
}

BufferedImage loadSplashSourceImage() {
    List<File> candidates = [
            file('splash_catgis.png'),
            file('src/main/resources/splash_catgis.png'),
            file('src/splash_catgis.png')
    ]
    return candidates.collect { readOptionalImage(it) }.find { it != null }
}

BufferedImage readOptionalImage(File imageFile) {
    if (!imageFile.exists()) {
        return null
    }
    try {
        return ImageIO.read(imageFile)
    } catch (Exception ignored) {
        return null
    }
}

BufferedImage createDirectSourceIconImage(BufferedImage source, int size) {
    BufferedImage image = new BufferedImage(size, size, BufferedImage.TYPE_INT_ARGB)
    Graphics2D g2 = image.createGraphics()
    try {
        g2.setRenderingHint(RenderingHints.KEY_ANTIALIASING, RenderingHints.VALUE_ANTIALIAS_ON)
        g2.setRenderingHint(RenderingHints.KEY_RENDERING, RenderingHints.VALUE_RENDER_QUALITY)
        g2.setRenderingHint(RenderingHints.KEY_INTERPOLATION, RenderingHints.VALUE_INTERPOLATION_BICUBIC)

        int crop = Math.min(source.width, source.height)
        int srcX = (source.width - crop) / 2
        int srcY = (source.height - crop) / 2
        double inset = Math.max(0d, size * 0.02d)
        double arc = Math.max(10d, size * 0.24d)
        g2.setClip(new RoundRectangle2D.Double(inset, inset, size - (inset * 2d), size - (inset * 2d), arc, arc))
        g2.drawImage(source, 0, 0, size, size, srcX, srcY, srcX + crop, srcY + crop, null)
    } finally {
        g2.dispose()
    }
    return image
}

BufferedImage createSplashBasedIconImage(BufferedImage splash, int size) {
    BufferedImage image = new BufferedImage(size, size, BufferedImage.TYPE_INT_ARGB)
    Graphics2D g2 = image.createGraphics()
    try {
        g2.setRenderingHint(RenderingHints.KEY_ANTIALIASING, RenderingHints.VALUE_ANTIALIAS_ON)
        g2.setRenderingHint(RenderingHints.KEY_RENDERING, RenderingHints.VALUE_RENDER_QUALITY)
        g2.setRenderingHint(RenderingHints.KEY_INTERPOLATION, RenderingHints.VALUE_INTERPOLATION_BICUBIC)
        g2.setRenderingHint(RenderingHints.KEY_TEXT_ANTIALIASING, RenderingHints.VALUE_TEXT_ANTIALIAS_ON)

        int crop = Math.min(splash.width, splash.height)
        int srcX = (splash.width - crop) / 2
        int srcY = (splash.height - crop) / 2

        g2.drawImage(splash, 0, 0, size, size, srcX, srcY, srcX + crop, srcY + crop, null)

        g2.setColor(new Color(9, 23, 43, 42))
        g2.fillRect(0, 0, size, size)

        float borderStroke = Math.max(2f, ((float) size) / 22f)
        g2.setColor(new Color(255, 255, 255, 205))
        g2.setStroke(new BasicStroke(borderStroke, BasicStroke.CAP_ROUND, BasicStroke.JOIN_ROUND))
        int inset = Math.max(1, Math.round(borderStroke))
        int borderSize = size - (inset * 2) - 1
        int borderArc = Math.max(8, (int) Math.round(size / 4d))
        g2.drawRoundRect(inset, inset, borderSize, borderSize, borderArc, borderArc)

        int badgeWidth = Math.max(18, (int) Math.round(size * 0.44d))
        int badgeHeight = Math.max(16, (int) Math.round(size * 0.22d))
        int badgeMargin = Math.max(4, (int) Math.round(size / 18d))
        int badgeX = size - badgeWidth - badgeMargin
        int badgeY = size - badgeHeight - badgeMargin
        int badgeArc = Math.max(8, (int) Math.round(badgeHeight / 2d))

        g2.setColor(new Color(20, 96, 182, 230))
        g2.fillRoundRect(badgeX, badgeY, badgeWidth, badgeHeight, badgeArc, badgeArc)
        g2.setColor(new Color(255, 255, 255, 240))
        float badgeStroke = Math.max(1.5f, ((float) size) / 64f)
        g2.setStroke(new BasicStroke(badgeStroke))
        g2.drawRoundRect(badgeX, badgeY, badgeWidth, badgeHeight, badgeArc, badgeArc)

        String text = size >= 48 ? 'CAT' : 'C'
        int fontSize = Math.max(9, size >= 48 ? (int) Math.round(size * 0.115d) : (int) Math.round(size * 0.26d))
        Font font = new Font('SansSerif', Font.BOLD, fontSize)
        g2.setFont(font)
        FontMetrics metrics = g2.getFontMetrics()
        int textX = badgeX + (badgeWidth - metrics.stringWidth(text)) / 2
        int textY = badgeY + ((badgeHeight - metrics.getHeight()) / 2) + metrics.getAscent()
        g2.setColor(Color.WHITE)
        g2.drawString(text, textX, textY)
    } finally {
        g2.dispose()
    }
    return image
}

BufferedImage createFallbackBrandIconImage(int size) {
    BufferedImage image = new BufferedImage(size, size, BufferedImage.TYPE_INT_ARGB)
    Graphics2D g2 = image.createGraphics()
    try {
        g2.setRenderingHint(RenderingHints.KEY_ANTIALIASING, RenderingHints.VALUE_ANTIALIAS_ON)
        g2.setRenderingHint(RenderingHints.KEY_RENDERING, RenderingHints.VALUE_RENDER_QUALITY)
        g2.setRenderingHint(RenderingHints.KEY_TEXT_ANTIALIASING, RenderingHints.VALUE_TEXT_ANTIALIAS_ON)

        int arc = Math.max(8, (int) (size / 3))
        g2.setColor(new Color(20, 96, 182))
        g2.fillRoundRect(0, 0, size - 1, size - 1, arc, arc)

        g2.setColor(new Color(255, 255, 255, 52))
        int glossyX = (int) (size / 10)
        int glossyY = (int) (size / 10)
        int glossyWidth = (int) (size - (size / 5))
        int glossyHeight = (int) (size / 3)
        g2.fillRoundRect(glossyX, glossyY, glossyWidth, glossyHeight, arc, arc)

        g2.setColor(new Color(245, 158, 11))
        float strokeWidth = Math.max(2f, ((float) size) / 12f)
        g2.setStroke(new BasicStroke(strokeWidth, BasicStroke.CAP_ROUND, BasicStroke.JOIN_ROUND))
        int underlineY = (int) Math.round(size * 0.78d)
        g2.drawLine((int) Math.round(size * 0.18d), underlineY, (int) Math.round(size * 0.82d), underlineY)

        String text = size >= 48 ? 'CAT' : 'C'
        int fontSize = size >= 48 ? (int) (size / 3) : (int) (size / 2)
        Font font = new Font('SansSerif', Font.BOLD, fontSize)
        g2.setFont(font)
        FontMetrics metrics = g2.getFontMetrics()
        int x = (size - metrics.stringWidth(text)) / 2
        int y = (size - metrics.getHeight()) / 2 + metrics.getAscent()
        g2.setColor(Color.WHITE)
        g2.drawString(text, x, y)
    } finally {
        g2.dispose()
    }
    return image
}

void writeIcoFile(File output, List<BufferedImage> images) {
    output.parentFile.mkdirs()
    List<byte[]> pngImages = images.collect { image ->
        ByteArrayOutputStream pngBytes = new ByteArrayOutputStream()
        ImageIO.write(image, 'png', pngBytes)
        pngBytes.toByteArray()
    }

    ByteArrayOutputStream out = new ByteArrayOutputStream()
    writeLeShort(out, 0)
    writeLeShort(out, 1)
    writeLeShort(out, pngImages.size())

    int offset = 6 + (16 * pngImages.size())
    images.eachWithIndex { BufferedImage image, int index ->
        int width = image.width >= 256 ? 0 : image.width
        int height = image.height >= 256 ? 0 : image.height
        byte[] pngBytes = pngImages[index]

        out.write(width)
        out.write(height)
        out.write(0)
        out.write(0)
        writeLeShort(out, 1)
        writeLeShort(out, 32)
        writeLeInt(out, pngBytes.length)
        writeLeInt(out, offset)
        offset += pngBytes.length
    }

    pngImages.each { out.write(it) }
    output.bytes = out.toByteArray()
}

void writeLeShort(ByteArrayOutputStream out, int value) {
    out.write(value & 0xFF)
    out.write((value >> 8) & 0xFF)
}

void writeLeInt(ByteArrayOutputStream out, int value) {
    out.write(value & 0xFF)
    out.write((value >> 8) & 0xFF)
    out.write((value >> 16) & 0xFF)
    out.write((value >> 24) & 0xFF)
}
